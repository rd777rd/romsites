{% load static %}
<header class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-md border-b border-slate-900 transition-all duration-300">

    <div class="flex items-center justify-between h-20">

          <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">

          </svg>

        <div>

      <!-- CTA Action Button -->

      <a href="mailto:romsitesllc@gmail.com" class="inline-flex items-center justify-center px-4 py-2 text-sm font-bold uppercase text-slate-900 bg-amber-400 rounded-lg hover:bg-amber-300">
